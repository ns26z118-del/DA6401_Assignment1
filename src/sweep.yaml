program: src/train.py

method: random

metric:
  name: val_accuracy
  goal: maximize

parameters:
  learning_rate:
    values: [0.0001, 0.0005, 0.001, 0.005]

  batch_size:
    values: [16, 32, 64]

  num_layers:
    values: [1, 2, 3]

  hidden_size:
    values: ["[64]", "[128]", "[256]", "[128,64]", "[256,128]"]

  activation:
    values: ["relu", "tanh", "sigmoid"]

  optimizer:
    values: ["sgd", "momentum", "nag", "rmsprop"]

  weight_decay:
    values: [0, 0.0001, 0.001]
